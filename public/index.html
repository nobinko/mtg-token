<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MTG Token Finder</title>
    <link rel="stylesheet" href="/styles.css?v=20260602-emblem-token-ja">
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="検索条件">
        <div>
          <h1>MTG Token Finder</h1>
          <p>デッキリストから、バルクのトークン束で探す現物を抜き出すための準備表です。</p>
        </div>
        <form id="search-form" class="controls">
          <label>
            フォーマット
            <select id="format">
              <option value="standard" selected>Standard</option>
              <option value="pioneer">Pioneer</option>
              <option value="modern">Modern</option>
              <option value="legacy">Legacy</option>
            </select>
          </label>
          <label>
            大会日
            <input id="target-date" type="date" value="2026-05-30">
          </label>
          <label>
            大会規模
            <select id="event-scale">
              <option value="spotlight" selected>Spotlight / 大型オープン</option>
              <option value="premier">PT / RC級</option>
              <option value="medium">中規模競技</option>
              <option value="local">店舗/小規模</option>
              <option value="custom">手動</option>
            </select>
          </label>
          <label>
            一般採用ライン
            <input id="usage-threshold" type="number" min="0.1" max="10" step="0.1" value="1">
          </label>
          <label>
            検出信頼度
            <input id="confidence" type="number" min="80" max="99.9" step="0.1" value="95">
          </label>
          <label>
            検索デッキ/リスト数
            <input id="max-pages" type="number" min="20" max="600" value="300">
          </label>
          <label>
            表示
            <select id="view-mode">
              <option value="set" selected>エキスパンション順</option>
              <option value="kind">種類別</option>
            </select>
          </label>
          <label>
            エキスパンション順
            <select id="set-sort">
              <option value="desc" selected>発売日 新しい順</option>
              <option value="asc">発売日 古い順</option>
            </select>
          </label>
          <div class="lang-toggle" role="group" aria-label="カード画像言語">
            <span class="lang-toggle-label">画像言語</span>
            <div class="lang-toggle-buttons">
              <button type="button" class="lang-btn lang-btn-active" data-lang="en" title="英語画像を表示">EN</button>
              <button type="button" class="lang-btn" data-lang="ja" title="日本語画像があるカードだけ日本語画像に切替">JA</button>
            </div>
          </div>
          <label class="check-control">
            <input id="hide-checked" type="checkbox">
            未チェックだけ
          </label>
          <label class="check-control">
            <input id="use-cache" type="checkbox" checked>
            巡回キャッシュを使う
          </label>
          <label class="check-control">
            <input id="refresh-cache" type="checkbox">
            今回は再取得
          </label>
          <button id="search-button" type="submit">検索</button>
          <button id="print-button" type="button">印刷</button>
          <button id="clear-cache-button" type="button">キャッシュ削除</button>
        </form>
      </section>

      <section class="sources">
        <label for="sources">巡回元URL</label>
        <textarea id="sources" spellcheck="false"></textarea>
      </section>

      <section class="status" id="status">フォーマットを選んで検索できます。</section>

      <section class="sampling-summary" id="sampling-summary"></section>
      <section class="environment-summary" id="environment-summary" hidden></section>
      <section class="summary" id="summary" hidden></section>
      <section class="archetype-summary" id="archetype-summary" hidden></section>
      <section class="token-summary" id="token-summary" hidden></section>
      <section class="deck-summary" id="deck-summary" hidden></section>

      <section class="results" id="results" aria-live="polite"></section>
    </main>

    <template id="set-template">
      <section class="set-group">
        <header class="set-header">
          <div>
            <p class="set-code"></p>
            <h2></h2>
          </div>
          <span class="count"></span>
        </header>
        <div class="object-grid"></div>
      </section>
    </template>

    <template id="object-template">
      <article class="card">
        <label class="picked-control">
          <input class="picked-checkbox" type="checkbox">
          <span>抜いた</span>
        </label>
        <a class="image-link" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy">
        </a>
        <div class="card-body">
          <div class="card-heading">
            <div>
              <h3></h3>
              <p class="jp"></p>
            </div>
            <span class="kind"></span>
          </div>
          <p class="type"></p>
          <div class="object-meta">
            <span class="deck-count"></span>
            <span class="set-pill"></span>
          </div>
          <p class="note"></p>
          <div class="hints"></div>
          <div class="source-preview"></div>
          <details>
            <summary>これを出すカード / 採用元</summary>
            <ul class="source-card-list"></ul>
            <ul class="source-list"></ul>
          </details>
        </div>
      </article>
    </template>

    <!-- ログパネル -->
    <div id="log-panel" class="log-panel">
      <div class="log-panel-header" id="log-panel-header">
        <span class="log-panel-title">
          <span class="log-dot" id="log-dot"></span>
          ログ
        </span>
        <span class="log-panel-actions">
          <button type="button" id="log-clear-btn" class="log-action-btn">クリア</button>
          <button type="button" id="log-toggle-btn" class="log-action-btn log-toggle-icon">▼</button>
        </span>
      </div>
      <div id="log-content" class="log-content" aria-live="polite"></div>
    </div>

    <script src="/app.js?v=20260602-emblem-token-ja" type="module"></script>
  </body>
</html>
